name: Pantheon Deploy Multi-Dev
# Github Action triggers when a branch is created off of main named
# feature/this-is-a-great-branch and a pull request is opened.
on:
  pull_request:
    branches:
      - main

env:
  GIT_COMMIT_MESSAGE: 'Github Actions Build'

jobs:
  run_if:
    if: startsWith(github.head_ref, 'feature/')
    runs-on: ubuntu-latest

    steps:
      - name: Clone the github repo in the Github Action container
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set some variables to use in the workflow
        run: |
          echo "NOW=$(date +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_ENV
          echo "GRUMPHP_GIT_WORKING_DIR=$(git rev-parse --show-toplevel)" >> $GITHUB_ENV

      - name: Setup PHP for Terminus
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ vars.PHP_VERSION }}

      - name: Add the Pantheon SSH Key for the CI user
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.PANTHEON_SSH_PRIVATE_KEY }}

      - name: Disable Pantheon SSH strict host key checking
        run: 'printf "\nHost *\n\tStrictHostKeyChecking no" >> ~/.ssh/config'

      - name: Install Terminus with a machine token
        uses: pantheon-systems/terminus-github-actions@main
        with:
          pantheon-machine-token: ${{ secrets.PANTHEON_MACHINE_TOKEN }}

      - name: Configure git config
        run: |
          git config --global user.name "NY Senate CI Bot"
          git config --global user.email "zalewski.senate+github@gmail.com"

      - name: Set up the Pantheon GIT Remote and create a friendly multidev name
        run: |
          git remote add pantheon ${{ vars.PANTHEON_GIT_REMOTE }}
          echo $(git remote -v)
          echo PANTHEON_MULTIDEV=$(echo "pr-${{ github.event.pull_request.number }}") >> $GITHUB_ENV

      - name: Cache Composer dependencies to make builds faster
        uses: actions/cache@v3
        env:
          cache-name: cache-vendor
        with:
          path: ./vendor
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/composer.lock') }}

      - name: Make composer available and do a composer install to build Drupal
        uses: php-actions/composer@v6
        with:
          php_version: ${{ vars.PHP_VERSION }}
          php_extensions: gd sodium zip

      - name: Setup Node with the version set in .nvmrc
        uses: actions/setup-node@v3
        with:
          node-version-file: '${{ vars.THEME_PATH }}/.nvmrc'
          cache: 'npm'
          cache-dependency-path: '${{ vars.THEME_PATH }}/package-lock.json'

      - name: Build nysenate_theme Theme Assets
        run: |
          cd ${{ vars.THEME_PATH }}
          npm install
          npm run build

      - name: Update NodeJS to version in nys theme via .nvmrc.
        uses: actions/setup-node@v3
        with:
          node-version-file: 'web/themes/custom/nys/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'web/themes/custom/nys/package-lock.json'

      - name: Build nys Theme Assets
        run: |
          cd web/themes/custom/nys
          npm install
          npm run build

      - name: Prepare and deploy build artifact to Pantheon
        run: |
          mkdir build
          rsync -az --exclude=node_modules --exclude=.git --exclude=/build ./ build/
          cd build
          git init
          git remote add pantheon ${{ vars.PANTHEON_GIT_REMOTE }}
          git checkout -b $PANTHEON_MULTIDEV
          git add -Af .
          git commit -q -m "${{ env.GIT_COMMIT_MESSAGE }} - ${{ env.NOW }}"
          git push --force pantheon HEAD:refs/heads/$PANTHEON_MULTIDEV

      - name: Check if Pantheon multidev environment exists
        run: |
          if [ $(terminus multidev:list ${{ vars.PANTHEON_SITE }} --field=id | grep -iw "$PANTHEON_MULTIDEV") ]; then
            echo "PANTHEON_MULTIDEV_EXISTS=TRUE" >> $GITHUB_ENV
          fi

      - name: Create a multidev environment if not existing
        if: ${{ !env.PANTHEON_MULTIDEV_EXISTS }}
        run: terminus env:create ${{ vars.PANTHEON_SITE }}.${{ vars.PANTHEON_MULTIDEV_CLONE_ENV }} $PANTHEON_MULTIDEV --no-files

      - name: Copy private settings file to multidev environment
        run: |
          DEST_SFTP_COMMAND=$(terminus connection:info --field=sftp_command -- ${{ vars.PANTHEON_SITE }}.${{ env.PANTHEON_MULTIDEV }})
          SOURCE_SFTP_COMMAND=$(terminus connection:info --field=sftp_command -- ${{ vars.PANTHEON_SITE }}.${{ vars.PANTHEON_MULTIDEV_CLONE_ENV }})
          SETTINGS_FILE="files/private/private_settings.php"
          LOCAL_FILE="${{ runner.temp }}/private_settings.php"
          echo -e "get $SETTINGS_FILE $LOCAL_FILE\nbye" | $SOURCE_SFTP_COMMAND
          echo -e "mkdir files/private\nput $LOCAL_FILE $SETTINGS_FILE\nbye" | $DEST_SFTP_COMMAND

      - name: Post a comment to the PR
        if: success()
        uses: ouzi-dev/commit-status-updater@v2
        with:
          name: "Code Deployed to Pantheon"
          status: "${{ job.status }}"
          url: https://${{ env.PANTHEON_MULTIDEV }}-${{ vars.PANTHEON_SITE }}.pantheonsite.io
          description: "Code has been deployed to the Pantheon ${{ env.PANTHEON_MULTIDEV }} multidev environment. Clicks details for the link."

      - name: Post to a Slack channel
        if: always()
        id: slack
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: '${{ vars.SLACK_CHANNEL }}'
          slack-message: "@${{ github.actor }} is pushing code today and it was a ${{ job.status }}!\n${{ github.event.pull_request.html_url || github.event.head_commit.url }}\nUsing Workflow: ${{ github.workflow }}\nPantheon: https://${{ env.PANTHEON_MULTIDEV }}-${{ vars.PANTHEON_SITE }}.pantheonsite.io"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  # ---------------------------------------------------------------------------
  # Cache regression tests
  #
  # Runs DTT ExistingSite tests ON the Pantheon multidev container itself via
  # `terminus remote:drush -- ev`. The test process must run inside the
  # container because Pantheon's Redis (used for page cache tag checksums) is
  # not reachable from outside the container network. Running inside ensures
  # the test process and the web server share the same DB and Redis instance,
  # so entity saves correctly invalidate cache entries via Redis.
  #
  # vendor/bin/phpunit is already present on the container — it was deployed
  # by the run_if job — so no Composer install is needed here.
  #
  # To run the same tests locally:
  #   ddev run-cache-tests
  # ---------------------------------------------------------------------------
  run_cache_tests:
    needs: run_if
    runs-on: ubuntu-latest

    steps:
      - name: Setup PHP (required to run Terminus)
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ vars.PHP_VERSION }}

      - name: Add the Pantheon SSH Key for the CI user
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.PANTHEON_SSH_PRIVATE_KEY }}

      - name: Disable Pantheon SSH strict host key checking
        run: 'printf "\nHost *\n\tStrictHostKeyChecking no" >> ~/.ssh/config'

      - name: Install Terminus
        uses: pantheon-systems/terminus-github-actions@main
        with:
          pantheon-machine-token: ${{ secrets.PANTHEON_MACHINE_TOKEN }}

      - name: Set multidev environment name
        run: echo "PANTHEON_MULTIDEV=pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV

      - name: Wake up the multidev (Pantheon envs sleep when idle)
        run: terminus env:wake ${{ vars.PANTHEON_SITE }}.${{ env.PANTHEON_MULTIDEV }}

      - name: Wait for multidev HTTP endpoint to be ready
        # Polls the homepage until it returns a non-5xx status. Handles the
        # gap between workflow completion and the appserver accepting requests.
        # 40 attempts × 30 s = up to 20 minutes total.
        run: |
          SITE_URL="https://${{ env.PANTHEON_MULTIDEV }}-${{ vars.PANTHEON_SITE }}.pantheonsite.io"
          echo "Polling $SITE_URL..."
          for i in $(seq 1 40); do
            STATUS=$(curl -sSo /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 30 "$SITE_URL/" 2>/dev/null || echo "000")
            if [[ "$STATUS" =~ ^[23] ]]; then
              echo "Site ready (HTTP $STATUS, attempt $i/40)"
              break
            fi
            if [[ $i -eq 40 ]]; then
              echo "Timed out waiting for site to be ready (last HTTP $STATUS)" >&2
              exit 1
            fi
            echo "Attempt $i/40: HTTP $STATUS — sleeping 30s"
            sleep 30
          done

      - name: Run cache regression tests on Pantheon container
        # Run each test class in a separate terminus call so that no single SSH
        # session exceeds Pantheon's server-side timeout (~20 min). The classes
        # are ordered fastest-last so a failure is detected quickly.
        run: |
          SITE="${{ vars.PANTHEON_SITE }}.${{ env.PANTHEON_MULTIDEV }}"
          URL="https://${{ env.PANTHEON_MULTIDEV }}-${{ vars.PANTHEON_SITE }}.pantheonsite.io"
          SCRIPT="bash /code/tests/dtt/run-on-container.sh $URL"
          for CLASS in AnonymousCacheHitTest AuthenticatedDynamicCacheTest CacheMissInvalidationTest NoCachePoisoningTest; do
            echo "=== Running $CLASS ==="
            terminus remote:drush "$SITE" -- \
              ev "passthru('$SCRIPT --filter $CLASS 2>&1', \$c); exit(\$c);"
          done

  # ---------------------------------------------------------------------------
  # Umbrella gate — the single required branch protection status check.
  #
  # Add new test jobs to the `needs` list here as they are introduced.
  # Only this job needs to be registered in GitHub branch protection settings.
  # ---------------------------------------------------------------------------
  functional_tests_passed:
    needs: [run_cache_tests]
    runs-on: ubuntu-latest
    steps:
      - name: All functional tests passed
        run: echo "All required functional test suites passed."
