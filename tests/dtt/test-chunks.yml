# Test chunk definitions for the DTT cache regression suite.
#
# This is the single source of truth for how the suite is split into separate
# PHP processes at runtime. Both run-on-container.sh (Pantheon CI) and
# .ddev/commands/web/run-cache-tests (local) read this file via PHP/symfony/yaml.
#
# WHY CHUNKS EXIST
# PHPUnit accumulates Mink session state and Redis-unserialized objects across
# tests in a single process. On Pantheon's 2 GB PHP limit this exhausts memory
# mid-run. Locally, large single-process runs can be killed (exit 137). Splitting
# into smaller filter-based chunks keeps peak RSS well under 1 GB per process.
#
# ADDING A TEST
# - If the new test belongs to an existing class and that class runs as a single
#   chunk (e.g. AuthenticatedDynamicCacheTest), no change is needed here.
# - If the new test is in a split class (AnonymousCacheHitTest or
#   CacheMissInvalidationTest), add the method name to the relevant filter below.
# - If you add a new test class, add a new chunk entry at the end.
#
# FILTER SYNTAX
# Each 'filter' value is passed directly to PHPUnit's --filter option.
# Use the ClassName::(method1|method2) regex format to select specific methods.
# A bare class name selects all methods in that class.

chunks:

  - label: "AnonymousCacheHitTest (cache HIT assertions)"
    filter: "AnonymousCacheHitTest::(testAnonymousCacheHit|testContentTypeDisplayPageCacheHit)"

  - label: "AnonymousCacheHitTest (cache-control max-age assertions)"
    filter: "AnonymousCacheHitTest::(testCacheControlMaxAge|testContentTypeDisplayPageCacheControlMaxAge)"

  - label: "AnonymousCacheHitTest (negative — non-invalidation)"
    filter: "AnonymousCacheHitTest::(testArticleEdit|testBillEdit|testEventEdit|testPetition|testContentTypeEdit)"

  - label: "AuthenticatedDynamicCacheTest (top-level pages)"
    filter: "AuthenticatedDynamicCacheTest::(testConstituentSecondVisitIsDynamicCacheHit|testDynamicCacheSharedAcrossUsers|testDynamicCacheMissAfterAccountChange)"

  - label: "AuthenticatedDynamicCacheTest (content type display pages)"
    filter: "AuthenticatedDynamicCacheTest::(testContentTypeDisplayPageDynamicCacheHit|testContentTypeDisplayPageDynamicCacheSharedAcrossUsers)"

  - label: "CacheMissInvalidationTest (top-level pages)"
    filter: "CacheMissInvalidationTest::(testHomepage|testNewsAndIssues|testSenatorsCommittees|testLegislation|testEvents|testAbout)"

  - label: "CacheMissInvalidationTest (content type display pages — node edit)"
    filter: "CacheMissInvalidationTest::testContentTypeDisplayPage"

  - label: "CacheMissInvalidationTest (content type display pages — related entity edit)"
    filter: "CacheMissInvalidationTest::(testArticlePage|testEventPage|testInTheNews|testMeeting|testPublicHearing|testResolution)"

  - label: "NoCachePoisoningTest"
    filter: "NoCachePoisoningTest"

