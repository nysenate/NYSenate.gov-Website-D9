services:
  nys_bill_vote.vote_widget_lazy_builder:
    class: Drupal\nys_bill_vote\BillVoteWidgetLazyBuilder
    arguments:
      - '@form_builder'
    tags:
      - { name: render.placeholder_renderer_lazy_builder }
  nys_bill_vote.bill_vote:
    class: Drupal\nys_bill_vote\BillVoteHelper
    arguments:
      - '@current_user'
      - '@datetime.time'
      - '@path.current'
      - '@current_route_match'
      - '@logger.factory'
      - '@entity_type.manager'
      - '@flag'
      - '@plugin.manager.votingapi.resultfunction'
      - '@nys_bill.bills_helper'
