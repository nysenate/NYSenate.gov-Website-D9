name: NYSenate Theme
type: theme
description: Child theme for NYSenate. WIP cleaning up the NY STATE SENATE theme.
package: NYSenate
core_version_requirement: ^10 || ^11
base theme: nysenate_theme
enforce_sdc_schemas: true

dependencies:
  - twig_field_value:twig_field_value
  - twig_tweak:twig_tweak

# This section lists the regions defined in the theme (our base theme) default
# page.html.twig and maintenance-page.html.twig files. The name before
# the semi-colon is the machine name of the region. The text after the
# semi-colon is the region's description used on the admin/structure/block page.
regions:
  # The three header regions are stacked vertically.
  header_top: Header Top
  header_middle: Header Middle
  header_bottom: Header Bottom
  above_content: Above Content
  content: Content
  sidebar_right: Sidebar Right
  # The three footer regions are stacked horizontally, so that each region can
  # have multiple blocks; the addendum is displayed afterwards.
  footer_left: Footer Left
  footer_middle: Footer Middle
  footer_right: Footer Right
  addendum: Addendum

libraries:
  - nys/global

# NOTE: Twig namespaces (@rain_theme, @nysenate_theme) are inherited from the
# parent theme (nysenate_theme). Do not re-declare them here, as the paths
# would be resolved relative to this theme directory where they don't exist,
# causing Components module to log warnings on every page request.
